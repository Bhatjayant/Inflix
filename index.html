<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inflix Pharma | Interactive Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="p-8 text-center text-2xl font-bold tracking-tighter">INFLIX PHARMA</nav>

    <div class="max-w-6xl mx-auto px-6 pb-20">
        <div class="flex flex-wrap gap-4 justify-center mb-12" id="filters">
            <button onclick="filter('all')" class="px-6 py-2 bg-blue-600 text-white rounded-full">All</button>
            <button onclick="filter('pain')" class="px-6 py-2 bg-white border border-slate-200 rounded-full hover:bg-blue-50">Pain & Neuro</button>
            <button onclick="filter('nutrition')" class="px-6 py-2 bg-white border border-slate-200 rounded-full hover:bg-blue-50">Nutrition</button>
            <button onclick="filter('anti')" class="px-6 py-2 bg-white border border-slate-200 rounded-full hover:bg-blue-50">Anti-Infective</button>
        </div>

        <div id="grid" class="grid md:grid-cols-3 gap-6">
            <div class="item pain p-8 bg-white rounded-3xl shadow-sm">
                <h3 class="font-bold text-lg">SPPlus™</h3>
                <p class="text-xs text-blue-600 font-bold uppercase mb-2">Pain Management</p>
                <p class="text-sm text-slate-500">Serratiopeptidase + Aceclofenac + Paracetamol.</p>
            </div>
            <div class="item nutrition p-8 bg-white rounded-3xl shadow-sm">
                <h3 class="font-bold text-lg">inflix-Gold™</h3>
                <p class="text-xs text-blue-600 font-bold uppercase mb-2">Multinutrient</p>
                <p class="text-sm text-slate-500">36 Power Nutrients for stamina and energy.</p>
            </div>
            <div class="item anti p-8 bg-white rounded-3xl shadow-sm">
                <h3 class="font-bold text-lg">Fix-OZ™</h3>
                <p class="text-xs text-blue-600 font-bold uppercase mb-2">Anti-Infective</p>
                <p class="text-sm text-slate-500">Ofloxacin + Ornidazole for mixed infections.</p>
            </div>
            </div>
    </div>

    <script>
        function filter(c) {
            document.querySelectorAll('.item').forEach(i => {
                i.style.display = (c === 'all' || i.classList.contains(c)) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
